    <main class="content">
      <div class="scenario-row" aria-label="Scenarios" role="region">
        <button class="scenario-pill active" data-scenario="grocery" aria-pressed="true">
          <img src="icons/grocery.svg" alt="" aria-hidden="true"><span>Grocery</span>
        </button>
        <button class="scenario-pill" data-scenario="restaurant"><img src="icons/restaurant.svg" alt="" aria-hidden="true"><span>Restaurant</span></button>
        <button class="scenario-pill" data-scenario="taxi"><img src="icons/taxi.svg" alt="" aria-hidden="true"><span>Taxi</span></button>
        <button class="scenario-pill" data-scenario="garden"><img src="icons/garden.svg" alt="" aria-hidden="true"><span>Garden</span></button>
      </div>

      <div class="lesson-layout">
        <section class="lesson-center">
          <div class="conversation-card" role="region" aria-label="Conversation">
            <h2>Grocery</h2>
            <div class="message-list">
              <div class="message bot">
                <button class="play-audio" aria-label="Play English audio">▶</button>
                <div class="bubble" id="text-to-read">Do you have apples?</div>
                <button class="play-nepali" aria-label="Play Nepali audio" id="play-audio" onclick="listen()">👂</button>
              </div>
              <div class="message user">
                <div class="bubble">Yes, we do.</div>
                <div class="avatar"><img src="img/avatar1.svg" alt="Shopkeeper"></div>
              </div>
              <div class="message bot">
                <input class="bubble" class="user-input" placeholder="Speak to answer" id="speechInput">
            </div>
      </div>

          <div class="input-row">
                <input id="speechInput-row" placeholder="Tap mic and speak..." aria-label="Speak answer">
                <button id="micBtn" aria-label="Record" onclick="record()">🎤</button>
              </div>

              <div class="progress-row">
                <div class="progress-bar" aria-hidden="true"><div class="progress-fill" style="width:35%"></div></div>
                <div class="progress-percent">35%</div>
              </div>
            </div>
          </section>

      <aside class="lesson-side" aria-label="Support">
        <div class="streak card">
          <h3>Streak</h3>
          <div id="streak_count"></div>
        </div>
        <div class="today-words card">
          <h3>Today's Words</h3>
          <ul id="todayWords">
            <li><input type="checkbox" id="w1"><label for="w1">apple</label></li>
            <li><input type="checkbox" id="w2"><label for="w2">banana</label></li>
            <li><input type="checkbox" id="w3"><label for="w3">bread</label></li>
            <li><input type="checkbox" id="w4"><label for="w4">milk</label></li>
            <li><input type="checkbox" id="w5"><label for="w5">rice</label></li>
          </ul>
        </div>

         <div class="vocab-card card">
                <h3>Vocabulary</h3>
                <div id="vocabList"> <!-- populated by JS when words appear in conversation -->
                  <p class="v-word">apple <button class="play-nepali-small">👂</button></p>
                </div>
              </div>

              <div class="cultural card">
                <h3></h3>
                <p></p>
                <div class="xp-row"><span>20 EXP</span><div class="xp-bar"><div class="xp-fill" style="width:20%"></div></div></div>
              </div>
            </aside>
          </div>
        </main>
